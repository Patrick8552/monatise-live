<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 620" role="img" aria-labelledby="title desc">
  <title id="title">Monatise client payout flow</title>
  <desc id="desc">Clients using Monatise with approval cards, payout readiness, and market intelligence panels.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f8fbfb"/>
      <stop offset="0.54" stop-color="#edf6f4"/>
      <stop offset="1" stop-color="#fff7e7"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" x2="1">
      <stop offset="0" stop-color="#e5a83c"/>
      <stop offset="1" stop-color="#ffd977"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#151515" flood-opacity="0.16"/>
    </filter>
  </defs>

  <rect width="920" height="620" rx="30" fill="url(#bg)"/>
  <circle cx="776" cy="116" r="96" fill="#0f766e" opacity="0.08"/>
  <circle cx="142" cy="478" r="128" fill="#f5b84b" opacity="0.12"/>

  <g filter="url(#shadow)">
    <rect x="96" y="78" width="728" height="458" rx="24" fill="#ffffff"/>
  </g>

  <rect x="132" y="116" width="656" height="54" rx="16" fill="#0f766e"/>
  <text x="164" y="150" fill="#ffffff" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="800">Monatise</text>
  <text x="632" y="149" fill="#d7fffa" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700">Client payout desk</text>

  <g>
    <rect x="132" y="196" width="284" height="214" rx="20" fill="#f8fafb" stroke="#d7dde4"/>
    <text x="160" y="232" fill="#151515" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="850">Payout-ready clients</text>
    <text x="160" y="260" fill="#5c6570" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="650">Manual approval completed</text>

    <g transform="translate(162 292)">
      <circle cx="36" cy="34" r="31" fill="#14403c"/>
      <circle cx="36" cy="23" r="10" fill="#f6c998"/>
      <path d="M15 58c5-14 36-14 42 0" fill="#f6c998"/>
      <rect x="80" y="7" width="150" height="18" rx="9" fill="#151515"/>
      <rect x="80" y="36" width="110" height="12" rx="6" fill="#c7d2da"/>
      <rect x="80" y="58" width="132" height="12" rx="6" fill="#dbe3e9"/>
    </g>

    <g transform="translate(162 368)">
      <circle cx="36" cy="34" r="31" fill="#f5b84b"/>
      <circle cx="36" cy="22" r="10" fill="#6f4420"/>
      <path d="M15 58c5-14 36-14 42 0" fill="#6f4420"/>
      <rect x="80" y="7" width="130" height="18" rx="9" fill="#151515"/>
      <rect x="80" y="36" width="126" height="12" rx="6" fill="#c7d2da"/>
      <rect x="80" y="58" width="96" height="12" rx="6" fill="#dbe3e9"/>
    </g>
  </g>

  <g>
    <rect x="456" y="196" width="332" height="112" rx="20" fill="#102a27"/>
    <text x="486" y="232" fill="#ffffff" font-family="Inter, Arial, sans-serif" font-size="19" font-weight="850">Bank details released</text>
    <text x="486" y="260" fill="#bbd6d2" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="650">Invoice matched to approved account</text>
    <rect x="664" y="250" width="82" height="30" rx="15" fill="url(#gold)"/>
    <text x="684" y="270" fill="#151515" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="900">READY</text>
  </g>

  <g>
    <rect x="456" y="330" width="332" height="150" rx="20" fill="#f8fafb" stroke="#d7dde4"/>
    <text x="486" y="366" fill="#151515" font-family="Inter, Arial, sans-serif" font-size="19" font-weight="850">Signal journal linked</text>
    <text x="486" y="393" fill="#5c6570" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="650">Access, learning, and payout steps in one flow</text>
    <polyline points="492,442 532,420 574,432 612,396 658,411 716,374" fill="none" stroke="#0f766e" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="532" cy="420" r="7" fill="#f5b84b"/>
    <circle cx="612" cy="396" r="7" fill="#f5b84b"/>
    <circle cx="716" cy="374" r="7" fill="#f5b84b"/>
  </g>

  <g>
    <rect x="192" y="460" width="436" height="52" rx="18" fill="#ffffff" stroke="#d7dde4"/>
    <circle cx="224" cy="486" r="12" fill="#0f766e"/>
    <path d="M218 486l5 5 10-12" fill="none" stroke="#ffffff" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="248" y="492" fill="#303842" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="800">Approved accounts move to payout readiness</text>
  </g>
</svg>
