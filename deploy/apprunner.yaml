AWSTemplateFormatVersion: "2010-09-09"
Description: Monatise App Runner service backed by an ECR container image.

Parameters:
  ServiceName:
    Type: String
    Default: monatise
  ImageIdentifier:
    Type: String
    Description: Full ECR image URI with tag.
  AccessRoleArn:
    Type: String
    Description: IAM role ARN that allows App Runner to pull the ECR image.
  InstanceRoleArn:
    Type: String
    Description: IAM role ARN that allows App Runner instances to read configured runtime secrets.
  RuntimeMode:
    Type: String
    Default: paper
    AllowedValues:
      - paper
      - live
  RuntimeNetwork:
    Type: String
    Default: testnet
    AllowedValues:
      - testnet
      - mainnet
  Symbol:
    Type: String
    Default: BTC
  OrderQuoteSize:
    Type: Number
    Default: 250
  MaxOrderNotional:
    Type: Number
    Default: 250
  MaxTotalNotional:
    Type: Number
    Default: 1500
  MaxBaseInventory:
    Type: Number
    Default: 0.1
  MaxDailyLoss:
    Type: Number
    Default: 100
  AllowLiveOrders:
    Type: String
    Default: "false"
    AllowedValues:
      - "false"
      - "true"
  LiveConfirmation:
    Type: String
    Default: ""
    NoEcho: true
  HyperliquidAccountAddressSecretArn:
    Type: String
    Default: ""
    NoEcho: true
  HyperliquidSecretKeySecretArn:
    Type: String
    Default: ""
    NoEcho: true

Conditions:
  HasHyperliquidAccountAddressSecret: !Not [!Equals [!Ref HyperliquidAccountAddressSecretArn, ""]]
  HasHyperliquidSecretKeySecret: !Not [!Equals [!Ref HyperliquidSecretKeySecretArn, ""]]

Resources:
  Service:
    Type: AWS::AppRunner::Service
    Properties:
      ServiceName: !Ref ServiceName
      SourceConfiguration:
        AuthenticationConfiguration:
          AccessRoleArn: !Ref AccessRoleArn
        AutoDeploymentsEnabled: true
        ImageRepository:
          ImageIdentifier: !Ref ImageIdentifier
          ImageRepositoryType: ECR
          ImageConfiguration:
            Port: "4174"
            RuntimeEnvironmentVariables:
              - Name: MONATISE_HOST
                Value: 0.0.0.0
              - Name: MONATISE_PORT
                Value: "4174"
              - Name: MONATISE_MODE
                Value: !Ref RuntimeMode
              - Name: MONATISE_NETWORK
                Value: !Ref RuntimeNetwork
              - Name: MONATISE_SYMBOL
                Value: !Ref Symbol
              - Name: MONATISE_ORDER_QUOTE_SIZE
                Value: !Ref OrderQuoteSize
              - Name: MONATISE_MAX_ORDER_NOTIONAL
                Value: !Ref MaxOrderNotional
              - Name: MONATISE_MAX_TOTAL_NOTIONAL
                Value: !Ref MaxTotalNotional
              - Name: MONATISE_MAX_BASE_INVENTORY
                Value: !Ref MaxBaseInventory
              - Name: MONATISE_MAX_DAILY_LOSS
                Value: !Ref MaxDailyLoss
              - Name: MONATISE_ALLOW_LIVE_ORDERS
                Value: !Ref AllowLiveOrders
              - Name: MONATISE_LIVE_CONFIRMATION
                Value: !Ref LiveConfirmation
            RuntimeEnvironmentSecrets:
              - !If
                - HasHyperliquidAccountAddressSecret
                - Name: HYPERLIQUID_ACCOUNT_ADDRESS
                  Value: !Ref HyperliquidAccountAddressSecretArn
                - !Ref AWS::NoValue
              - !If
                - HasHyperliquidSecretKeySecret
                - Name: HYPERLIQUID_SECRET_KEY
                  Value: !Ref HyperliquidSecretKeySecretArn
                - !Ref AWS::NoValue
      InstanceConfiguration:
        InstanceRoleArn: !Ref InstanceRoleArn
      HealthCheckConfiguration:
        Protocol: HTTP
        Path: /api/status
        Interval: 10
        Timeout: 5
        HealthyThreshold: 1
        UnhealthyThreshold: 5

Outputs:
  ServiceArn:
    Value: !Ref Service
  ServiceUrl:
    Value: !GetAtt Service.ServiceUrl
