services:
  - type: web
    name: monatise-live
    runtime: docker
    plan: starter
    region: oregon
    dockerfilePath: ./deploy/Dockerfile
    dockerContext: .
    healthCheckPath: /api/health
    autoDeployTrigger: commit
    disk:
      name: monatise-auth-data
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: MONATISE_MODE
        value: live
      - key: MONATISE_NETWORK
        value: mainnet
      - key: MONATISE_HOST
        value: 0.0.0.0
      - key: MONATISE_PUBLIC_URL
        value: https://monatise-live.onrender.com
      - key: MONATISE_AUTH_DB
        value: /data/monatise-users.db
      - key: MONATISE_ENCRYPTION_KEY
        sync: false
      - key: MONATISE_SOLANA_RPC_URL
        value: https://api.mainnet-beta.solana.com
      - key: MONATISE_USDC_SOLANA_ADDRESS
        value: 69aNnKVjSin6x2HYqMgu9FsWawWDiRxohGfZw8efGjue
      - key: MONATISE_ARBITRUM_RPC_URL
        value: https://arb1.arbitrum.io/rpc
      - key: MONATISE_POLYGON_RPC_URL
        value: https://polygon-rpc.com
      - key: MONATISE_SYMBOL
        value: BTC
      - key: MONATISE_DATA_FEED
        value: coinglass
      - key: MONATISE_EXCHANGE
        value: hyperliquid
      - key: COINGLASS_API_KEY
        sync: false
      - key: MONATISE_SMTP_HOST
        sync: false
      - key: MONATISE_SMTP_PROVIDER
        sync: false
      - key: MONATISE_SMTP_FROM
        sync: false
      - key: MONATISE_SMTP_PORT
        value: 587
      - key: MONATISE_SMTP_USERNAME
        sync: false
      - key: MONATISE_SMTP_PASSWORD
        sync: false
      - key: MONATISE_SMTP_STREAM
        sync: false
      - key: MONATISE_ALERT_EMAILS
        sync: false
      - key: MONATISE_SMTP_SSL
        value: false
      - key: MONATISE_SMTP_STARTTLS
        value: true
      - key: MONATISE_TRADINGVIEW_WEBHOOK_TOKEN
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_PRIVATE_PRICE_ID
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: STRIPE_SUCCESS_URL
        value: https://monatise-live.onrender.com/?billing=success
      - key: STRIPE_CANCEL_URL
        value: https://monatise-live.onrender.com/?billing=cancelled
      - key: BACKPACK_REST_BASE
        value: https://api.backpack.exchange
      - key: BACKPACK_API_KEY
        sync: false
      - key: BACKPACK_SECRET_KEY
        sync: false
      - key: BACKPACK_SYMBOL_MAP
        value: BTC=BTC_USDC_PERP,ETH=ETH_USDC_PERP,SOL=SOL_USDC_PERP
      - key: COINGLASS_EXCHANGE
        value: Binance
      - key: COINGLASS_EXCHANGE_LIST
        value: Binance,OKX,Bybit
      - key: MONATISE_ASSETS
        value: BTC,ETH,SOL,HYPE,BNB,XRP,DOGE
      - key: MONATISE_BUILDER_DEXES
        value: xyz
      - key: MONATISE_EXECUTION_MODE
        value: live
      - key: MONATISE_LEVERAGE
        value: 10
      - key: MONATISE_ORDER_QUOTE_SIZE
        value: 25
      - key: MONATISE_MAX_ORDER_NOTIONAL
        value: 25
      - key: MONATISE_MAX_TOTAL_NOTIONAL
        value: 150
      - key: MONATISE_MAX_BASE_INVENTORY
        value: 0.1
      - key: MONATISE_MAX_DAILY_LOSS
        value: 25
      - key: MONATISE_MAX_MARK_MOVE_PCT
        value: 0.03
      - key: MONATISE_MAX_POSITION_VALUE
        value: 250
      - key: MONATISE_ORDER_REFRESH_SECONDS
        value: 30
      - key: MONATISE_SIGNAL_SESSION_WINDOW
        value: always
      - key: MONATISE_ALLOW_LIVE_ORDERS
        value: true
      - key: MONATISE_LIVE_CONFIRMATION
        value: I_UNDERSTAND_REAL_MONEY
